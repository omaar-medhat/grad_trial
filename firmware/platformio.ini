; PulseGuard AI - bracelet firmware (reference)
; ---------------------------------------------
; ESP32-C3 is the low-cost demo MCU from the project plan. The same sketch
; runs on most ESP32 variants; for the nRF52840 path use the nRF Connect SDK /
; Zephyr instead (see docs/ble_spec.md) — this WiFi+REST sketch is the quickest
; way to get a physical bracelet streaming into the existing backend.
;
; Build:   pio run
; Flash:   pio run -t upload
; Monitor: pio device monitor -b 115200

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    sparkfun/SparkFun LSM6DSO Arduino Library @ ^1.0.3

build_flags =
    ; Override these with -D flags or edit config.h before flashing.
    -D PULSE_FW_VERSION="\"1.0.0\""
