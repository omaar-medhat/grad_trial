<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PulseGuard AI - Smart Health Monitoring</title>
  <meta name="description" content="AI-enabled smart health monitoring bracelet companion: live vitals, anomaly detection, and a safe healthcare chatbot." />
  <meta name="author" content="PulseGuard AI Team" />
  <meta name="theme-color" content="#198060" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PulseGuard" />

  <!-- Open Graph -->
  <meta property="og:title" content="PulseGuard AI" />
  <meta property="og:description" content="AI-powered medical assistant for vital signs analysis" />
  <meta property="og:type" content="website" />

  <!-- Icons + manifest -->
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ("serviceWorker" in navigator && location.protocol === "https:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch((err) =>
          console.warn("[pwa] service worker registration failed:", err)
        );
      });
    }
  </script>
</body>

</html>
